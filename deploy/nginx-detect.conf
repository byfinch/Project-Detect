# Detect Ops Center — nginx reverse proxy (HTTPS + basic rate limit)
# Sertifika: certbot --nginx -d detect.ornek-domain.com

limit_req_zone $binary_remote_addr zone=detect_api:10m rate=10r/s;

server {
    listen 80;
    server_name detect.ornek-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name detect.ornek-domain.com;

    ssl_certificate     /etc/letsencrypt/live/detect.ornek-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/detect.ornek-domain.com/privkey.pem;

    # Panel kendi login ekranını sunuyor (session cookie) — IP kısıtı istersen:
    # allow 1.2.3.4; deny all;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSE (canlı olay akışı) — buffering kapalı olmalı
    location /api/events {
        limit_req zone=detect_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
